<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard Tracker</title>
</head>
<body>

<h2>Enter Score</h2>

Name: <input type="text" id="name"><br><br>
Score: <input type="number" id="score"><br><br>

<button onclick="submitScore()">Submit</button>

<h3>Leaderboard</h3>
<pre id="leaderboard">No leaders yet.</pre>

<script>
    // MUST match server port + route
    var ipAddressAndPort = "http://localhost:3000";

    function submitScore() {
        var name = document.getElementById("name").value;
        var score = document.getElementById("score").value;

        fetch(ipAddressAndPort + "/submitScore", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: name,
                score: score
            })
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message); // required by assignment
            document.getElementById("leaderboard").textContent = data.Leaders;
        })
        .catch(err => {
            console.log(err);
            alert("Server error.");
        });
    }
</script>

</body>
</html>
